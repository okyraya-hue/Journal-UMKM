<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembukuan UMKM</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f7;
  margin: 0;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 15px;
}

/* LOGO */
.logo {
  text-align: center;
}
.logo png {
  width: 30px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 20px;
  margin: 10px 0;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* GRID */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
}

.btn-save { background: #28a745; color: white; }
.btn-reset { background: #ccc; }

/* TABLE */
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  font-size: 12px;
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #ddd;
  overflow: hidden;
  white-space: nowrap;
}

th { background: #28a745; color: white; }

td:nth-child(2) { text-align: left; }

.masuk { color: green; font-weight: bold; }
.keluar { color: red; font-weight: bold; }

.hapus-btn {
  background: #e74c3c;
  color: white;
  border: none;
  padding: 4px;
  border-radius: 6px;
}

/* SALDO */
.saldo {
  text-align: right;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="title">Pembukuan UMKM</div>

  <div class="card">

    <div class="grid-2">
      <input type="date" id="tgl">
      <input type="text" id="ket" placeholder="Keterangan">
    </div>

    <select id="jenis">
      <option value="Masuk">Uang Masuk</option>
      <option value="Keluar">Uang Keluar</option>
    </select>

    <div class="grid-2">
      <input type="number" id="qty" placeholder="Qty">
      <input type="number" id="harga" placeholder="Harga">
    </div>

    <button class="btn btn-save" onclick="tambah()">Simpan</button>

    <button class="btn btn-reset" onclick="resetData()">Reset Semua</button>

  </div>

  <table id="tabel">
    <thead>
      <tr>
        <th>Tgl</th>
        <th>Ket</th>
        <th>Jenis</th>
        <th>Qty</th>
        <th>Total</th>
        <th>X</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="saldo" id="saldo">Saldo: 0</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("jurnalUMKM")) || [];

function render() {
  let tbody = document.querySelector("#tabel tbody");
  tbody.innerHTML = "";
  let saldo = 0;

  data.forEach((d, i) => {
    let total = d.qty * d.harga;
    saldo += d.jenis === "Masuk" ? total : -total;

    tbody.innerHTML += `
      <tr>
        <td>${d.tgl}</td>
        <td>${d.ket}</td>
        <td class="${d.jenis=='Masuk'?'masuk':'keluar'}">${d.jenis}</td>
        <td>${d.qty}</td>
        <td>${total}</td>
        <td><button class="hapus-btn" onclick="hapus(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("saldo").innerText = "Saldo: " + saldo;
}

function tambah() {
  let tgl = document.getElementById("tgl").value;
  let ket = document.getElementById("ket").value;
  let jenis = document.getElementById("jenis").value;
  let qty = parseInt(document.getElementById("qty").value);
  let harga = parseInt(document.getElementById("harga").value);

  if (!tgl || !ket || !qty || !harga) {
    alert("Isi semua data!");
    return;
  }

  data.push({ tgl, ket, jenis, qty, harga });
  localStorage.setItem("jurnalUMKM", JSON.stringify(data));

  render();

  ket.value = "";
  qty.value = "";
  harga.value = "";
}

function hapus(i) {
  data.splice(i, 1);
  localStorage.setItem("jurnalUMKM", JSON.stringify(data));
  render();
}

function resetData() {
  if (confirm("Hapus semua data?")) {
    localStorage.removeItem("jurnalUMKM");
    data = [];
    render();
  }
}

render();
</script>

</body>
</html>
